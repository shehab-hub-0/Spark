# =============================================================================
# log4j2.properties — Clean logging for PySpark development
# Suppresses Spark's verbose INFO flood; shows WARN+ for Spark internals
# and INFO+ for your own application code (com.yourapp, root logger).
# =============================================================================

rootLogger.level = warn
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p [%t] %c{1} - %m%n

# ── Suppress noisy Spark internals ───────────────────────────────────────────
logger.spark.name = org.apache.spark
logger.spark.level = warn

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn

logger.hive.name = org.apache.hive
logger.hive.level = warn

logger.parquet.name = org.apache.parquet
logger.parquet.level = warn

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = warn

logger.netty.name = io.netty
logger.netty.level = warn

# ── Keep SparkContext lifecycle messages visible ───────────────────────────────
logger.sparkcontext.name = org.apache.spark.SparkContext
logger.sparkcontext.level = info

# ── Your application namespace (set to INFO for full visibility) ───────────────
# Uncomment and adjust to match your package name:
# logger.myapp.name = com.yourcompany
# logger.myapp.level = info
