# =============================================================================
# spark-defaults.conf
# Optimized for: Single-Node Local Mode | 12 GB RAM | 6 CPU Cores
#
# Memory Budget (12 GB total):
#   - OS + Docker overhead  : ~2 GB reserved (non-negotiable)
#   - Usable by Spark        : ~10 GB
#   - spark.driver.memory    : 8g  (driver IS the executor in local mode)
#   - spark.driver.memoryOverheadFactor: accounts for off-heap JVM usage
#   - Off-heap overhead (20%): ~1.6g  → total JVM footprint ≈ 9.6g ✓
#   - Remaining headroom     : ~0.4g  → safe buffer against OOM
#
# CPU Budget (6 cores total):
#   - local[*] auto-detects all available cores (6)
#   - spark.driver.cores = 6 (all cores to driver in local mode)
#   - spark.sql.shuffle.partitions tuned to 2× cores for local mode
# =============================================================================

# ── Master / Execution Mode ───────────────────────────────────────────────────
spark.master                            local[*]

# ── Driver Memory (this IS your Spark engine in local mode) ──────────────────
spark.driver.memory                     8g
spark.driver.cores                      6
spark.driver.maxResultSize              2g

# ── Off-Heap & Overhead (prevents silent OOM crashes) ────────────────────────
# memoryOverheadFactor: fraction of driver memory reserved for JVM overhead
# 0.2 = 20% of 8g = 1.6g off-heap → total footprint ≈ 9.6g (safe under 10g)
spark.driver.memoryOverheadFactor       0.2

# ── Executor settings (in local mode, driver==executor; these are still read) ─
spark.executor.memory                   8g
spark.executor.cores                    6
spark.executor.memoryOverheadFactor     0.2

# ── SQL / Shuffle Tuning ─────────────────────────────────────────────────────
# For local mode with 6 cores, 2× parallelism = 12 partitions
# (Spark default of 200 is wildly oversized for single-node dev work)
spark.sql.shuffle.partitions            12
spark.default.parallelism               12

# ── Adaptive Query Execution (Spark 3.x — use it) ────────────────────────────
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled   true
spark.sql.adaptive.coalescePartitions.minPartitionNum   1

# ── Arrow-based columnar serialization (pandas ↔ Spark speedup) ──────────────
spark.sql.execution.arrow.pyspark.enabled       true
spark.sql.execution.arrow.pyspark.fallback.enabled  true

# ── Hive / Warehouse (local filesystem — no Hive required) ───────────────────
spark.sql.warehouse.dir                 /tmp/spark-warehouse
spark.sql.catalogImplementation         in-memory

# ── Event Log (enables Spark UI history if needed) ───────────────────────────
spark.eventLog.enabled                  true
spark.eventLog.dir                      /tmp/spark-events

# ── UI port (accessible inside the container) ────────────────────────────────
spark.ui.port                           4040
spark.ui.enabled                        true

# ── Serialization (Kryo is faster than Java default) ─────────────────────────
spark.serializer                        org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max         512m

# ── Network timeouts (relaxed for dev, avoids false-positive failures) ────────
spark.network.timeout                   800s
spark.executor.heartbeatInterval        60s

# ── Python worker ─────────────────────────────────────────────────────────────
spark.python.worker.memory              512m
spark.python.worker.reuse               true

# ── Logging ──────────────────────────────────────────────────────────────────
spark.driver.extraJavaOptions           -Dlog4j2.configurationFile=/opt/spark/conf/log4j2.properties
