# ================================================================
# Smart City — Full Data Platform (Production-Grade Learning Env)
# Optimized for 24GB RAM Host (21GB Allocation, Serial GC JVMs)
# ================================================================

networks:
  data-platform-net:
    driver: bridge
    name: data-platform-net
    ipam:
      config:
        - subnet: 172.29.0.0/16

x-restart-policy: &restart-policy
  restart: unless-stopped

# Airflow 3.x common anchor
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  image: custom-airflow:3.2.1-py312
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'true'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-web:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    SPARK_HOME: /opt/spark
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    PYTHONPATH: /home/airflow/.local/lib/python3.12/site-packages
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  networks:
    - data-platform-net

x-spark-base: &spark-base
  <<: *restart-policy
  build:
    context: .
    dockerfile: docker/Dockerfile.spark
  image: custom-spark:${SPARK_VERSION:-3.5.0}-py311
  user: root
  environment: &spark-env
    SPARK_NO_DAEMONIZE: "true"
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3
  dns:
    - 8.8.8.8
  networks:
    - data-platform-net

services:

  # ── PostgreSQL (Shared Metadata + Warehouse) ───────────────────
  postgres:
    <<: *restart-policy
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/pg-init.sql/pg-init.sql:/docker-entrypoint-initdb.d/pg-init.sql
    command: postgres -c shared_buffers=128MB -c work_mem=4MB -c max_connections=50 -c maintenance_work_mem=64MB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - data-platform-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Redis ──────────────────────────────────────────────────────
