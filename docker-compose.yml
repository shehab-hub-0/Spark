  # ── Spark Master ───────────────────────────────────────────────
  spark-master:
    <<: *spark-base
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    ports:
      - "8085:8080"
      - "7077:7077"
    environment:
      <<: *spark-env
      SPARK_DAEMON_MEMORY: 512m
      SPARK_DAEMON_JAVA_OPTS: "-XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.spark.rule=Host(`spark.local`)"
      - "traefik.http.routers.spark.entrypoints=web"
      - "traefik.http.services.spark.loadbalancer.server.port=8080"
    volumes:
      - spark_logs:/opt/spark/logs
      - spark_ivy_cache:/root/.ivy2
      - ./config/spark-defaults.conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    depends_on:
      nessie:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Spark Worker ───────────────────────────────────────────────
  spark-worker-1:
    <<: *spark-base
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081 --cores 2 --memory 1536m
    ports:
      - "8092:8081"
    environment:
      <<: *spark-env
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 1536m
      SPARK_DAEMON_MEMORY: 512m
      SPARK_DAEMON_JAVA_OPTS: "-XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
    volumes:
      - spark_logs:/opt/spark/logs
      - spark_checkpoints:/opt/spark/checkpoints
      - spark_ivy_cache:/root/.ivy2
      - ./config/spark-defaults.conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./data:/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M

  # ── Spark Worker 2 ───────────────────────────────────────────────
