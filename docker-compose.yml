      - ./config/spark-defaults.conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./data:/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M

  # ── Spark Notebook (JupyterLab) ────────────────────────────────
  jupyter-workspace:
    <<: *restart-policy
    build:
      context: .
      dockerfile: docker/Dockerfile.notebook
    container_name: jupyter-workspace
    hostname: jupyter-workspace
    ports:
      - "8889:8888"
      - "4042:4040"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      PYSPARK_PYTHON: "python3"
      PYSPARK_DRIVER_PYTHON: "python3"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-admin}"
      SPARK_DAEMON_JAVA_OPTS: "-XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./config/spark-defaults.conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
      - ./data:/data
      - ./scripts:/home/jovyan/scripts
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/api" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - data-platform-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

  # ── Spark History Server ───────────────────────────────────────
  spark-history:
    <<: *spark-base
    container_name: spark-history
    hostname: spark-history
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"
    environment:
      <<: *spark-env
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=s3a://spark-logs/event-logs -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000 -Dspark.hadoop.fs.s3a.access.key=minioadmin -Dspark.hadoop.fs.s3a.secret.key=minioadmin -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      SPARK_DAEMON_MEMORY: 512m
      SPARK_DAEMON_JAVA_OPTS: "-XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
    volumes:
      - ./config/spark-defaults.conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M

  # ── Nessie (Iceberg Catalog) ───────────────────────────────────
  nessie:
    <<: *restart-policy
    image: projectnessie/nessie:latest
    container_name: nessie
    hostname: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      JAVA_OPTS: -Xms256M -Xmx512M -XX:+UseSerialGC
    networks:
      - data-platform-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  # ── Dremio (Federation SQL Engine) ────────────────────────────
  dremio:
    <<: *restart-policy
    image: dremio/dremio-oss:latest
    container_name: dremio
    hostname: dremio
    ports:
      - "9047:9047"
      - "31010:31010"
      - "32010:32010"
      - "45678:45678"
    environment:
      - DREMIO_MAX_MEMORY_SIZE_MB=4096
      - DREMIO_MAX_DIRECT_MEMORY_SIZE_MB=512
      - DREMIO_JAVA_EXTRA_OPTS=-XX:+UseSerialGC -XX:MaxMetaspaceSize=256m
    volumes:
      - dremio_data:/opt/dremio/data
    depends_on:
      nessie:
        condition: service_started
    networks:
      - data-platform-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  # ── ClickHouse (OLAP Data Warehouse — Gold Layer) ──────────────
  clickhouse:
    <<: *restart-policy
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_MAX_SERVER_MEMORY_USAGE: "2147483648"
      CLICKHOUSE_ADMIN_PASSWORD: "${CLICKHOUSE_ADMIN_PASSWORD:-admin}"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-platform-net
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--user", "admin", "--password", "${CLICKHOUSE_ADMIN_PASSWORD:-admin}", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2560M
