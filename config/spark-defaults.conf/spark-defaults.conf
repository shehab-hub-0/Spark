# ================================================================
# Spark Defaults Configuration — Full Data Platform Edition
# ================================================================

# ═══════════════════════════════════════════════════
# S3 / MinIO Configuration
# ═══════════════════════════════════════════════════
spark.hadoop.fs.s3a.endpoint                            http://minio:9000
spark.hadoop.fs.s3a.access.key                          minioadmin
spark.hadoop.fs.s3a.secret.key                          minioadmin
spark.hadoop.fs.s3a.path.style.access                   true
spark.hadoop.fs.s3a.connection.ssl.enabled              false
spark.hadoop.fs.s3a.impl                                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.impl                                 org.apache.hadoop.fs.s3a.S3AFileSystem

# S3A Magic Committer — Fast Writes (no temp file rename overhead)
spark.hadoop.fs.s3a.committer.name                      magic
spark.hadoop.fs.s3a.committer.magic.enabled             true
spark.hadoop.fs.s3a.connection.maximum                  200
spark.hadoop.fs.s3a.threads.max                         200
spark.hadoop.fs.s3a.fast.upload                         true
spark.hadoop.fs.s3a.fast.upload.buffer                  disk

# ═══════════════════════════════════════════════════
# Query Engine Optimizations (AQE & Serialization)
# ═══════════════════════════════════════════════════
# Adaptive Query Execution — replans at runtime based on actual data statistics
spark.sql.adaptive.enabled                              true
spark.sql.adaptive.coalescePartitions.enabled           true
spark.sql.adaptive.skewJoin.enabled                     true

# Kryo serialization — faster than default Java serialization
spark.serializer                                        org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max                         512m

# Parquet settings
spark.sql.parquet.compression.codec                     snappy
spark.sql.sources.partitionOverwriteMode                dynamic

# ═══════════════════════════════════════════════════
# Iceberg & Nessie Configuration
# ═══════════════════════════════════════════════════
spark.sql.extensions                                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions
spark.sql.catalog.nessie                                org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl                   org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri                            http://nessie:19120/api/v1
spark.sql.catalog.nessie.authentication.type            NONE
spark.sql.catalog.nessie.ref                            main
spark.sql.catalog.nessie.warehouse                      s3a://warehouse
spark.sql.catalog.nessie.io-impl                        org.apache.iceberg.hadoop.HadoopFileIO

# Iceberg Performance — Vectorized reads + Catalog cache
spark.sql.iceberg.vectorization.enabled                 true
spark.sql.catalog.nessie.cache-enabled                  true
spark.sql.catalog.nessie.cache.expiration-interval-ms   30000

# ═══════════════════════════════════════════════════
# ClickHouse Catalog (Data Warehouse — Gold Layer)
# ═══════════════════════════════════════════════════
spark.sql.catalog.clickhouse                            com.clickhouse.spark.ClickHouseCatalog
spark.sql.catalog.clickhouse.host                       clickhouse
spark.sql.catalog.clickhouse.protocol                   http
spark.sql.catalog.clickhouse.http_port                  8123
spark.sql.catalog.clickhouse.user                       admin
spark.sql.catalog.clickhouse.password                   admin
spark.sql.catalog.clickhouse.database                   default

# ═══════════════════════════════════════════════════
# Dynamic Resource Allocation
# ═══════════════════════════════════════════════════
spark.dynamicAllocation.enabled                         true
spark.dynamicAllocation.shuffleTracking.enabled         true
spark.dynamicAllocation.minExecutors                    1
spark.dynamicAllocation.maxExecutors                    4
spark.dynamicAllocation.executorIdleTimeout             60s

# ═══════════════════════════════════════════════════
# Resource Limits (optimized for 6 concurrent notebooks)
# driver 512m + executor 768m ≈ 1.3GB per notebook × 6 = 7.8GB
# ═══════════════════════════════════════════════════
spark.driver.memory                                     512m
spark.executor.memory                                   768m
spark.driver.cores                                      1
spark.executor.cores                                    1
spark.sql.shuffle.partitions                            50

# ═══════════════════════════════════════════════════
# Event Logging (History Server → MinIO)
# ═══════════════════════════════════════════════════
spark.eventLog.enabled                                  true
spark.eventLog.dir                                      s3a://spark-logs/event-logs
spark.history.fs.logDirectory                           s3a://spark-logs/event-logs
